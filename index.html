<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>Team HR Portal</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; }
    #tabs button { margin-right: 8px; }
    .tab { margin-top: 16px; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; font-size: 13px; }
    th { background: #f0f0f0; }
    .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    .badge.Pending { background:#ffeb3b; }
    .badge.Approved { background:#c8e6c9; }
    .badge.Rejected { background:#ffcdd2; }
  </style>
</head>
<body>
  <h2>Team HR Portal</h2>

  <div id="login-section">
    <input type="email" id="emailInput" placeholder="輸入公司 Email" style="width:260px;" />
    <button id="loginBtn">Login</button>
    <span id="loginMsg" style="color:red; margin-left:8px;"></span>
  </div>

  <div id="main-section" style="display:none;">
    <p id="userInfo"></p>

    <div id="tabs">
      <button data-tab="leave">請假申請</button>
      <button data-tab="myRecords">我的記錄</button>
      <button data-tab="team" id="teamTab" style="display:none;">Team 管理</button>
    </div>

    <div id="tab-leave" class="tab">
      <h3>請假申請</h3>
      <label>類型：
        <select id="leaveType">
          <option value="Annual">年假</option>
          <option value="Sick">病假</option>
          <option value="Comp">補假</option>
          <option value="Unpaid">無薪</option>
        </select>
      </label>
      <br/>
      <label>開始日期：<input type="date" id="leaveStart" /></label><br/>
      <label>結束日期：<input type="date" id="leaveEnd" /></label><br/>
      <label>原因：<input type="text" id="leaveReason" style="width:300px;" /></label><br/>
      <button id="submitLeaveBtn">提交申請</button>
      <span id="leaveMsg" style="margin-left:8px;"></span>

      <h4>我最近的申請</h4>
      <table id="myLeaveTable">
        <thead>
          <tr><th>ID</th><th>類型</th><th>起</th><th>止</th><th>天數</th><th>狀態</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="tab-myRecords" class="tab" style="display:none;">
      <h3>我的記錄</h3>
      <div id="mySummary"></div>
    </div>

    <div id="tab-team" class="tab" style="display:none;">
      <h3>Pending 請假</h3>
      <table id="pendingTable">
        <thead>
          <tr><th>ID</th><th>員工</th><th>類型</th><th>日期</th><th>天數</th><th>原因</th><th>操作</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
